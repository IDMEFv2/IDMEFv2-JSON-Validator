name: Copy Validator to main website PP
on:
  push:
    paths:
      - 'Validator/**'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Check out the repository"
        uses: actions/checkout@v4
        with:
          path: IDMEFv2-JSON-Validator
          submodules: true

      - name: "Check out the repository of the main website"
        uses: actions/checkout@v4
        with:
          path: IDMEFv2.github.io
          repository: IDMEFv2/IDMEFv2.github.io
          token: ${{ secrets.GH_PAT }}

      - name: "Generate manifests"
        shell: pwsh
        run: |
          Set-Location IDMEFv2-JSON-Validator
          .\scripts\generate-manifests.ps1

      - name: "Copy files"
        run: |
          rm -rf IDMEFv2.github.io/Validator-PP
          mkdir -p IDMEFv2.github.io/Validator-PP
          cp -rf IDMEFv2-JSON-Validator/Validator IDMEFv2.github.io/Validator-PP
          mkdir -p IDMEFv2.github.io/Validator-PP/drafts
          cp -rf IDMEFv2-JSON-Validator/drafts/IDMEFv2 IDMEFv2.github.io/Validator-PP/drafts/IDMEFv2
          cp -rf IDMEFv2-JSON-Validator/examples IDMEFv2.github.io/Validator-PP/examples

      - name: "Commit and push"
        run: |
          cd IDMEFv2.github.io
          git config --global user.email "contact@bytesnai.tech"
          git config --global user.name "Bytes 'n AI"
          git add --all
          git commit -m "Update Validator-PP"
          git push